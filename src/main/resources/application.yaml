spring:
  application:
    name: bug-report-service

  main:
    banner-mode: "off"

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: 8080

# Настройки приложения
app:
  jwt:
    secret: ${JWT_SECRET}
  s3:
    endpoint: ${SPRING_CLOUD_AWS_S3_ENDPOINT}
    region: ${SPRING_CLOUD_AWS_S3_REGION}
    bucket: ${SPRING_CLOUD_AWS_S3_BUCKET}
    access-key: ${SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY}
    secret-key: ${SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY}
